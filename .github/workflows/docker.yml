name: build
on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: mlugg/setup-zig@v2
      - run: cargo install cargo-zigbuild
      - uses: Swatinem/rust-cache@v2
      - name: Build binary
        run: cargo zigbuild --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/sapi-sbuser

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: dist
      - name: Prepare binaries
        run: |
          mkdir -p docker/amd64 docker/arm64
          cp dist/binary-x86_64-unknown-linux-musl/api-sbuser docker/amd64/
          cp dist/binary-aarch64-unknown-linux-musl/api-sbuser docker/arm64/
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.repository_owner }}/api-sbuser:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max